name: build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.6.4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 7.6.4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        env:
          JAVA_TOOL_OPTIONS: "-Xss16m -Dfile.encoding=UTF-8"
        run: ./gradlew build --no-daemon --stacktrace 2>&1

      - name: Upload jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cosmeticsmod-jar
          path: build/libs/*.jar
