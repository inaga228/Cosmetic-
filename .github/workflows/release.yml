name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.6.4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 7.6.4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        env:
          JAVA_TOOL_OPTIONS: "-Xss16m -Dfile.encoding=UTF-8"
        run: ./gradlew build --no-daemon

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.tag }}"
          # Берём блок между ## [VERSION] и следующим ## [
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Нет описания. Добавь раздел \`## [$VERSION]\` в CHANGELOG.md"
          fi
          # Сохраняем многострочный вывод
          {
            echo "notes<<EOF_NOTES"
            echo "$NOTES"
            echo "EOF_NOTES"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.tag.outputs.tag }}
          name: "🎨 Cosmetics Mod v${{ steps.tag.outputs.tag }}"
          body: |
            ## 🎨 Cosmetics Mod v${{ steps.tag.outputs.tag }}

            **Minecraft:** 1.16.5 | **Forge:** 36+

            ${{ steps.changelog.outputs.notes }}

            ---
            ### 📥 Установка
            1. Скачай `.jar` файл ниже
            2. Положи в `.minecraft/mods/`
            3. Запускай игру → **Right Shift** для открытия меню

            *Собрано автоматически через GitHub Actions*
          files: build/libs/*.jar
          draft: false
          prerelease: false
