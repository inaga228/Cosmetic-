name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.6.4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 7.6.4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        env:
          JAVA_TOOL_OPTIONS: "-Xss16m -Dfile.encoding=UTF-8"
        run: ./gradlew build --no-daemon

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Cosmetics Mod ${{ steps.tag.outputs.tag }}"
          body: |
            ## 🎨 Cosmetics Mod ${{ steps.tag.outputs.tag }}

            **Minecraft:** 1.16.5  
            **Forge:** 36+

            ### 📥 Установка
            1. Скачай файл `.jar` ниже
            2. Положи в папку `.minecraft/mods/`
            3. Запускай игру, открывай меню через **Right Shift**

            ---
            *Собрано автоматически через GitHub Actions*
          files: build/libs/*.jar
          draft: false
          prerelease: false
